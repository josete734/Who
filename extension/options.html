<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>who — OSINT · Settings</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 520px; margin: 24px auto; padding: 0 16px; }
    label { display: block; margin-top: 14px; font-size: 13px; color: #333; }
    input { width: 100%; box-sizing: border-box; padding: 8px; font-size: 14px; }
    button { margin-top: 16px; padding: 8px 14px; font-size: 14px; cursor: pointer; }
    .ok { color: #0a7d2c; margin-left: 10px; }
    .hint { color: #666; font-size: 12px; }
  </style>
</head>
<body>
  <h2>who — OSINT · Settings</h2>
  <p class="hint">Host permission for the configured backend will be requested when needed.</p>

  <label>Backend base URL</label>
  <input id="apiBase" type="url" placeholder="https://who.example.com" />

  <label>Bearer token</label>
  <input id="apiToken" type="password" placeholder="paste token" />

  <div>
    <button id="save" type="button">Save</button>
    <span id="status" class="ok"></span>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function load() {
      chrome.storage.sync.get(["apiBase", "apiToken"], (cfg) => {
        $("apiBase").value  = cfg.apiBase  || "";
        $("apiToken").value = cfg.apiToken || "";
      });
    }

    async function requestHost(base) {
      try {
        const u = new URL(base);
        const origin = `${u.protocol}//${u.host}/*`;
        if (chrome.permissions && chrome.permissions.request) {
          await new Promise((res) => chrome.permissions.request({ origins: [origin] }, res));
        }
      } catch (_) { /* invalid URL handled by save */ }
    }

    $("save").addEventListener("click", async () => {
      const apiBase = $("apiBase").value.trim().replace(/\/+$/, "");
      const apiToken = $("apiToken").value.trim();
      if (!apiBase) { $("status").textContent = "URL required"; return; }
      try { new URL(apiBase); } catch { $("status").textContent = "Invalid URL"; return; }
      await requestHost(apiBase);
      chrome.storage.sync.set({ apiBase, apiToken }, () => {
        $("status").textContent = "Saved.";
        setTimeout(() => ($("status").textContent = ""), 1500);
      });
    });

    document.addEventListener("DOMContentLoaded", load);
  </script>
</body>
</html>

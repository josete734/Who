name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel previous runs on the same ref so PR pushes don't queue up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_USER: test
          POSTGRES_DB: osint
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      AUTH_TOKEN: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/osint
      REDIS_URL: redis://localhost:6379/0
      SEARXNG_URL: http://localhost:8080

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            backend/pyproject.toml
            backend/requirements.txt

      - name: Install runtime + dev deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev] coverage
          # NetworkX + curl_cffi land via pyproject; force-install in case
          # the editable install resolved an older lockfile.
          pip install "networkx>=3.2"

      - name: Run pytest with coverage
        working-directory: backend
        run: |
          coverage run --source=app -m pytest -q --maxfail=10 -x \
            tests/test_regression_sanitize.py \
            tests/test_strava_wave2_core.py \
            tests/test_wave3_wiring.py \
            tests/test_graph_analytics.py \
            tests/test_wave5_entity_resolution.py \
            tests/test_wave6_antiblock.py \
            tests/test_wave7_ai_collection.py \
            tests/test_wave8_collectors.py \
            tests/test_wave9_consensus.py \
            tests/test_orchestrator_golden_path.py \
            tests/test_new_collectors.py \
            tests/test_entity_resolution.py \
            tests/test_strava_public.py \
            tests/test_resilience.py \
            tests/test_wave4_collectors.py
          coverage report --fail-under=70
          coverage xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml
          retention-days: 14

  e2e:
    needs: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bring stack up via docker compose
        run: |
          cp .env.example .env || true
          docker compose up -d --build
          # Wait for the backend to answer.
          for i in $(seq 1 60); do
            if curl -fs http://localhost:8765/health >/dev/null 2>&1; then
              echo "backend up"; break
            fi
            sleep 2
          done

      - name: Install Playwright + run e2e
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npm test

      - name: Collect docker logs on failure
        if: failure()
        run: docker compose logs --tail=200 > /tmp/compose.log || true

      - name: Upload docker logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs
          path: /tmp/compose.log
          retention-days: 7

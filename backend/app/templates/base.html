<!doctype html>
<html lang="es" class="h-full bg-neutral-950 text-neutral-100">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}who · OSINT Tool{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com?plugins=typography,forms"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { mono: ['ui-monospace','SFMono-Regular','Menlo','monospace'] },
          animation: { 'pulse-slow': 'pulse 2.2s cubic-bezier(0.4,0,0.6,1) infinite' },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .card { background: rgba(23,23,23,0.85); border: 1px solid rgba(255,255,255,0.06); border-radius: 0.75rem; }
    .tag { display:inline-flex; align-items:center; padding: 0.15rem 0.55rem; border-radius: 0.5rem; font-size: 0.72rem; font-family: ui-monospace,SFMono-Regular,Menlo,monospace; }
    .stat-card { background: linear-gradient(180deg, rgba(23,23,23,0.95), rgba(15,15,15,0.95)); border: 1px solid rgba(255,255,255,0.06); border-radius: 0.75rem; padding: 1.1rem 1.2rem; }
    .stat-num { font-variant-numeric: tabular-nums; font-weight: 600; letter-spacing: -0.02em; }
    pre { white-space: pre-wrap; word-break: break-word; }
    details > summary { list-style: none; cursor: pointer; }
    details > summary::-webkit-details-marker { display: none; }
    .tab-active { border-color: rgb(229 231 235); color: rgb(245 245 245); }
    .tab-inactive { border-color: transparent; color: rgb(163 163 163); }
    .tab-inactive:hover { color: rgb(229 229 229); }
    .prose-invert a { color: rgb(125 211 252); }
    .spinner { border: 2px solid rgba(255,255,255,0.15); border-top-color: rgb(234 179 8); border-radius: 50%; width: 10px; height: 10px; animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media print {
      header, .no-print { display: none !important; }
      body { background: white !important; color: black !important; }
      .card, .stat-card { background: white !important; border-color: #ccc !important; }
      .prose-invert { color: black !important; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="min-h-full">
  <header class="border-b border-neutral-800 sticky top-0 z-20 backdrop-blur bg-neutral-950/80 no-print">
    <div class="max-w-[1400px] mx-auto flex items-center justify-between px-5 py-3">
      <a href="/" class="flex items-center gap-2 text-sm">
        <span class="text-xl font-semibold tracking-tight">who</span>
        <span class="text-neutral-500">·</span>
        <span class="text-neutral-400">Perfil digital de una persona</span>
      </a>
      <div class="flex items-center gap-5 text-xs text-neutral-400">
        <a href="/" class="hover:text-white">Inicio</a>
        <a href="/settings" class="hover:text-white">Ajustes</a>
        <a href="https://github.com/" class="hover:text-white" target="_blank">GitHub</a>
      </div>
    </div>
  </header>
  <main class="max-w-[1400px] mx-auto px-5 py-6">
    {% block body %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>

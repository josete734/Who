services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: osint
      POSTGRES_USER: osint
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changemeosint}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osint -d osint"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: "http://searxng:8080/"
      UWSGI_WORKERS: 4
      UWSGI_THREADS: 4
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://osint:${POSTGRES_PASSWORD:-changemeosint}@postgres:5432/osint
      REDIS_URL: redis://redis:6379/0
      SEARXNG_URL: http://searxng:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_cache:/data/cache
      - backend_exports:/data/exports
    # Expose only on loopback; nginx on the host is the public gateway.
    ports:
      - "127.0.0.1:8765:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers", "--forwarded-allow-ips", "*"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://osint:${POSTGRES_PASSWORD:-changemeosint}@postgres:5432/osint
      REDIS_URL: redis://redis:6379/0
      SEARXNG_URL: http://searxng:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_cache:/data/cache
      - backend_exports:/data/exports
    command: ["arq", "app.tasks.WorkerSettings"]

volumes:
  postgres_data:
  redis_data:
  backend_cache:
  backend_exports:

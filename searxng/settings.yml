use_default_settings: true

general:
  instance_name: "OSINT Tool SearXNG"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: false

server:
  secret_key: "changeme-searxng-secret-key-rotate-before-use"
  limiter: false
  image_proxy: false
  public_instance: false
  http_protocol_version: "1.1"

ui:
  static_use_hash: true
  default_theme: simple

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "es"
  formats:
    - html
    - json

outgoing:
  request_timeout: 10.0
  max_request_timeout: 15.0
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true

engines:
  - name: google
    disabled: false
  - name: bing
    disabled: false
  - name: duckduckgo
    disabled: false
  - name: brave
    disabled: false
  - name: startpage
    disabled: false
  - name: qwant
    disabled: false
  - name: yandex
    disabled: false
  - name: mojeek
    disabled: false
  - name: wikipedia
    disabled: false
  - name: wikidata
    disabled: false
  - name: github
    disabled: false
  - name: reddit
    disabled: false
  - name: stackoverflow
    disabled: false
  - name: gitlab
    disabled: false
